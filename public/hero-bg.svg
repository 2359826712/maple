<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="30%" stop-color="#2d1b69"/>
      <stop offset="60%" stop-color="#e8763a"/>
      <stop offset="80%" stop-color="#f4a942"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="75%" r="25%">
      <stop offset="0%" stop-color="#fff7e6" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40916c"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="hill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#40916c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1800" height="900" fill="url(#sky)"/>

  <!-- Sun glow -->
  <ellipse cx="900" cy="680" rx="500" ry="300" fill="url(#sun)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="200" cy="80" r="1.5"/><circle cx="450" cy="50" r="1"/>
    <circle cx="700" cy="120" r="1.2"/><circle cx="1100" cy="60" r="1.5"/>
    <circle cx="1400" cy="90" r="1"/><circle cx="1600" cy="40" r="1.3"/>
    <circle cx="300" cy="150" r="0.8"/><circle cx="800" cy="30" r="1.1"/>
    <circle cx="1250" cy="140" r="0.9"/><circle cx="1550" cy="130" r="1.2"/>
    <circle cx="100" cy="200" r="0.7"/><circle cx="550" cy="180" r="1"/>
    <circle cx="1700" cy="170" r="0.8"/>
  </g>

  <!-- Distant misty mountains -->
  <path d="M0 550 Q200 420 400 480 Q600 380 800 440 Q1000 360 1200 420 Q1400 370 1600 430 Q1700 400 1800 450 L1800 600 L0 600Z" fill="#3a1f5e" opacity="0.5"/>

  <!-- Mid hills -->
  <path d="M0 580 Q150 500 350 540 Q550 460 750 520 Q950 440 1150 500 Q1350 440 1550 490 Q1700 460 1800 510 L1800 650 L0 650Z" fill="url(#hill1)" opacity="0.8"/>

  <!-- Giant Maple Tree trunk -->
  <g transform="translate(850, 250)">
    <rect x="-30" y="0" width="60" height="350" rx="8" fill="#5c3317"/>
    <rect x="-20" y="20" width="8" height="300" rx="4" fill="#4a2710" opacity="0.5"/>
    <rect x="12" y="40" width="6" height="280" rx="3" fill="#4a2710" opacity="0.4"/>

    <!-- Tree canopy -->
    <ellipse cx="0" cy="-40" rx="200" ry="150" fill="#c0392b" opacity="0.85"/>
    <ellipse cx="-60" cy="-80" rx="140" ry="110" fill="#e74c3c" opacity="0.75"/>
    <ellipse cx="70" cy="-60" rx="130" ry="100" fill="#d35400" opacity="0.7"/>
    <ellipse cx="0" cy="-120" rx="100" ry="80" fill="#e67e22" opacity="0.65"/>
    <ellipse cx="-30" cy="-30" rx="160" ry="100" fill="#c0392b" opacity="0.6"/>

    <!-- Leaf details -->
    <g fill="#f39c12" opacity="0.5">
      <ellipse cx="-100" cy="-20" rx="40" ry="25"/>
      <ellipse cx="110" cy="10" rx="35" ry="20"/>
      <ellipse cx="0" cy="-160" rx="30" ry="18"/>
      <ellipse cx="-140" cy="-60" rx="25" ry="15"/>
      <ellipse cx="150" cy="-40" rx="28" ry="16"/>
    </g>
  </g>

  <!-- Smaller trees -->
  <g transform="translate(300, 400)">
    <rect x="-12" y="0" width="24" height="180" rx="4" fill="#5c3317"/>
    <ellipse cx="0" cy="-20" rx="80" ry="60" fill="#27ae60" opacity="0.8"/>
    <ellipse cx="-20" cy="-40" rx="50" ry="40" fill="#2ecc71" opacity="0.7"/>
    <ellipse cx="25" cy="-10" rx="55" ry="45" fill="#27ae60" opacity="0.65"/>
  </g>

  <g transform="translate(1450, 380)">
    <rect x="-15" y="0" width="30" height="200" rx="5" fill="#5c3317"/>
    <ellipse cx="0" cy="-30" rx="90" ry="70" fill="#c0392b" opacity="0.75"/>
    <ellipse cx="30" cy="-50" rx="60" ry="50" fill="#e74c3c" opacity="0.65"/>
    <ellipse cx="-25" cy="-15" rx="65" ry="50" fill="#d35400" opacity="0.6"/>
  </g>

  <!-- Mushroom houses -->
  <g transform="translate(500, 560)">
    <rect x="-20" y="-30" width="40" height="50" rx="3" fill="#deb887"/>
    <ellipse cx="0" cy="-35" rx="35" ry="25" fill="#e74c3c"/>
    <circle cx="-12" cy="-38" r="6" fill="#fff" opacity="0.8"/>
    <circle cx="10" cy="-30" r="5" fill="#fff" opacity="0.8"/>
    <rect x="-5" y="-10" width="10" height="15" rx="2" fill="#8b6914"/>
    <rect x="10" y="-20" width="8" height="8" rx="1" fill="#87ceeb" opacity="0.7"/>
  </g>

  <g transform="translate(1250, 545)">
    <rect x="-25" y="-35" width="50" height="55" rx="3" fill="#deb887"/>
    <ellipse cx="0" cy="-40" rx="42" ry="30" fill="#e67e22"/>
    <circle cx="-15" cy="-42" r="7" fill="#fff" opacity="0.8"/>
    <circle cx="12" cy="-35" r="6" fill="#fff" opacity="0.8"/>
    <rect x="-6" y="-12" width="12" height="18" rx="2" fill="#8b6914"/>
    <rect x="14" y="-25" width="9" height="9" rx="1" fill="#87ceeb" opacity="0.7"/>
  </g>

  <!-- Foreground hills -->
  <path d="M0 620 Q300 560 600 590 Q900 540 1200 580 Q1500 550 1800 600 L1800 700 L0 700Z" fill="url(#hill2)"/>

  <!-- Slime monsters -->
  <g transform="translate(650, 620)">
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#2ecc71" opacity="0.9"/>
    <ellipse cx="0" cy="-5" rx="16" ry="10" fill="#27ae60" opacity="0.5"/>
    <circle cx="-6" cy="-4" r="3" fill="#1a1a2e"/>
    <circle cx="6" cy="-4" r="3" fill="#1a1a2e"/>
    <ellipse cx="0" cy="2" rx="4" ry="2" fill="#1a5c35"/>
  </g>

  <g transform="translate(1100, 635)">
    <ellipse cx="0" cy="0" rx="18" ry="13" fill="#e67e22" opacity="0.9"/>
    <ellipse cx="0" cy="-4" rx="14" ry="8" fill="#d35400" opacity="0.5"/>
    <circle cx="-5" cy="-3" r="2.5" fill="#1a1a2e"/>
    <circle cx="5" cy="-3" r="2.5" fill="#1a1a2e"/>
    <ellipse cx="0" cy="2" rx="3.5" ry="1.5" fill="#a04000"/>
  </g>

  <!-- Mushroom monster -->
  <g transform="translate(950, 630)">
    <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#deb887"/>
    <ellipse cx="0" cy="-15" rx="18" ry="12" fill="#e74c3c"/>
    <circle cx="-6" cy="-16" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="-4" cy="-6" r="2" fill="#1a1a2e"/>
    <circle cx="4" cy="-6" r="2" fill="#1a1a2e"/>
    <ellipse cx="0" cy="-2" rx="3" ry="1.5" fill="#1a1a2e"/>
  </g>

  <!-- Closest hill -->
  <path d="M0 680 Q200 640 500 660 Q800 630 1100 660 Q1400 640 1800 670 L1800 900 L0 900Z" fill="url(#hill3)"/>

  <!-- Floating meso coins -->
  <g filter="url(#glow)">
    <g fill="#fbbf24">
      <circle cx="400" cy="350" r="8" opacity="0.8"/>
      <circle cx="1350" cy="300" r="7" opacity="0.7"/>
      <circle cx="700" cy="280" r="6" opacity="0.6"/>
      <circle cx="1050" cy="320" r="9" opacity="0.75"/>
      <circle cx="250" cy="400" r="5" opacity="0.5"/>
      <circle cx="1550" cy="380" r="6" opacity="0.55"/>
    </g>
  </g>

  <!-- Light particles / bokeh -->
  <g filter="url(#softglow)" opacity="0.3">
    <circle cx="200" cy="500" r="15" fill="#fbbf24"/>
    <circle cx="600" cy="450" r="12" fill="#f97316"/>
    <circle cx="1000" cy="400" r="18" fill="#fbbf24"/>
    <circle cx="1400" cy="480" r="14" fill="#f97316"/>
    <circle cx="350" cy="350" r="10" fill="#fde68a"/>
    <circle cx="1200" cy="350" r="11" fill="#fde68a"/>
    <circle cx="800" cy="500" r="13" fill="#fbbf24"/>
    <circle cx="1600" cy="420" r="9" fill="#fde68a"/>
  </g>

  <!-- Grass details on foreground -->
  <g stroke="#2d6a4f" stroke-width="2" opacity="0.4">
    <line x1="100" y1="700" x2="95" y2="680"/>
    <line x1="108" y1="700" x2="112" y2="678"/>
    <line x1="350" y1="695" x2="345" y2="672"/>
    <line x1="358" y1="695" x2="363" y2="670"/>
    <line x1="750" y1="680" x2="745" y2="658"/>
    <line x1="758" y1="680" x2="763" y2="656"/>
    <line x1="1050" y1="685" x2="1045" y2="662"/>
    <line x1="1058" y1="685" x2="1063" y2="660"/>
    <line x1="1400" y1="675" x2="1395" y2="652"/>
    <line x1="1408" y1="675" x2="1413" y2="650"/>
    <line x1="1700" y1="690" x2="1695" y2="668"/>
    <line x1="1708" y1="690" x2="1713" y2="665"/>
  </g>
</svg>