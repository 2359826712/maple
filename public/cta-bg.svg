<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cta-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="600" fill="url(#cta-sky)"/>
  <!-- Floating islands -->
  <g opacity="0.25">
    <ellipse cx="300" cy="350" rx="180" ry="40" fill="#52b788"/>
    <ellipse cx="300" cy="340" rx="150" ry="30" fill="#40916c"/>
    <rect x="280" y="350" width="40" height="60" rx="4" fill="#8B6914"/>
    <ellipse cx="300" cy="310" rx="60" ry="45" fill="#2d6a4f"/>
  </g>
  <g opacity="0.2">
    <ellipse cx="900" cy="250" rx="220" ry="50" fill="#52b788"/>
    <ellipse cx="900" cy="240" rx="180" ry="35" fill="#40916c"/>
    <rect x="870" y="200" width="15" height="50" rx="3" fill="#5c3317"/>
    <ellipse cx="878" cy="185" rx="40" ry="30" fill="#c0392b"/>
    <rect x="920" y="210" width="12" height="40" rx="3" fill="#5c3317"/>
    <ellipse cx="926" cy="195" rx="35" ry="25" fill="#e74c3c"/>
  </g>
  <g opacity="0.15">
    <ellipse cx="1350" cy="400" rx="160" ry="35" fill="#52b788"/>
    <ellipse cx="1350" cy="392" rx="130" ry="25" fill="#40916c"/>
  </g>
  <!-- Clouds -->
  <g fill="#fff" opacity="0.15">
    <ellipse cx="200" cy="100" rx="100" ry="30"/>
    <ellipse cx="250" cy="95" rx="60" ry="25"/>
    <ellipse cx="700" cy="80" rx="120" ry="35"/>
    <ellipse cx="760" cy="75" rx="70" ry="28"/>
    <ellipse cx="1200" cy="120" rx="90" ry="28"/>
    <ellipse cx="1250" cy="115" rx="55" ry="22"/>
  </g>
  <!-- Sparkles -->
  <g fill="#fbbf24" opacity="0.3">
    <circle cx="150" cy="200" r="3"/><circle cx="500" cy="150" r="2.5"/>
    <circle cx="800" cy="180" r="3.5"/><circle cx="1100" cy="130" r="2"/>
    <circle cx="1400" cy="200" r="3"/><circle cx="400" cy="280" r="2"/>
    <circle cx="1050" cy="350" r="2.5"/><circle cx="650" cy="400" r="3"/>
  </g>
</svg>